    <script src='./names.js'></script>

    <script>
        var current_game = "fe7"
        const default_text = ` `.repeat(5)

        var games = ["fe1", "fe2", "fe3", "fe4", "fe5", "fe6", "fe7", "fe8", "fe9", "fe10", "fe11", "fe12", "fe13", "fe14", "fe15", "fe16", "fe17"]
        var list_for_all_games = ["fe11", "fe15", "fe12", "fe4", "fe5", "fe6", "fe7", "fe8", "fe9", "fe10", "fe13", "fe14", "fe16", "fe17"]

        var num_cols = 10

        var current_mode = "standard"

        var game_map = {
            "fe1": [fe1_names, "Shadow Dragon NES"],
            "fe2": [fe2_names, "Gaiden"],
            "fe3": [fe3_book2names, "Mystery of the Emblem"],
            "fe4": [[...new Set([...fe4_gen1, ...fe4_gen2])], "Geneaology"],
            "fe5": [fe5_names, "Thracia 776"],
            "fe6": [fe6_names, "Binding Blade"],
            "fe7": [fe7_names, "Blazing Blade"],
            "fe8": [fe8_names, "Sacred Stones"],
            "fe9": [fe9_names, "Path of Radiance"],
            "fe10": [fe10_names, "Radiant Dawn"],
            "fe11": [fe11_names, "Shadow Dragon DS"],
            "fe12": [fe12_names, "New Mystery"],
            "fe13": [[...new Set([...fe13_adults, ...fe13_children])], "Awakening"],
            "fe14": [fe14_names, "Fates"],
            "fe15": [fe15_names, "Shadows of Valentia"],
            "fe16": [fe16_names, "Three Houses"],
            "fe17": [fe17_names, "Engage"],
        }

        var directory_map = {
            "fe1": "fe1",
            "fe2": "fe2",
            "fe3": "fe3",
            "fe4": "fe4",
            "fe4_gen1": "fe4",
            "fe4_gen2": "fe4",
            "fe4_substitutes": "fe4",
            "fe5": "fe5",
            "fe6": "fe6",
            "fe7": "fe7",
            "fe8": "fe8",
            "fe9": "fe9",
            "fe10": "fe10",
            "fe11": "fe11",
            "fe12": "fe12",
            "fe13": "fe13",
            "fe13_adults": "fe13",
            "fe13_children": "fe13",
            "fe14": "fe14",
            "fe15": "fe15",
            "fe16": "fe16",
            "fe17": "fe17"
        }

        var table_index_map = {}
        var next_square_map = {}
        var typed_names = []

        document.getElementById(`count`).textContent = 0
        document.getElementById(`totalCount`).textContent = 0

        initialize_game(current_game)

        //Game select listener
        document.getElementById('gameselect').addEventListener('change', function () {
            //Reset the tables and labels for every game
            if (this.value != current_game) {
                if (!document.getElementById("warnings").checked || confirm("Changing the game will reset your progress. Proceed?")) {
                    next_square_map = {}
                    table_index_map = {}
                    typed_names = []
                    document.getElementById(`count`).textContent = 0
                    document.getElementById(`totalCount`).textContent = 0

                    if (current_game == 'all') {
                        for (const game of list_for_all_games) {
                            document.getElementById(`${game}Logo`).setAttribute("hidden", "hidden")
                            document.getElementById(`${game}Table`).border = 0
                        }
                    }
                    else {
                        document.getElementById(`${current_game}Logo`).setAttribute("hidden", "hidden")
                        document.getElementById(`${current_game}Table`).border = 0
                    }

                    for (const game of games) {
                        table = document.getElementById(`${game}Table`)
                        rows = table.rows.length
                        for (var i = 0; i < rows; i++) {
                            table.deleteRow(-1);
                        }
                        //label = document.getElementById(`${game}Label`)
                        //label.textContent = ''
                    }
                    if (this.value == 'all') {
                        for (const game of list_for_all_games) {
                            initialize_game(game)
                        }
                        document.getElementById(`gamename`).textContent = 'All'
                    }
                    else {
                        initialize_game(this.value)
                    }
                    current_game = this.value
                    document.querySelector('input[name=charname]').value = ''
                    reset()
                }
                else {
                    this.value = current_game
                }


            }

        })

        //Mode select listener
        document.getElementById('modeselect').addEventListener('change', function () {
            //Reset the tables and labels for every game
            if (this.value != current_mode) {
                if (!document.getElementById("warnings").checked || confirm("Changing the mode will reset your progress. Proceed?")) {
                    current_mode = this.value
                    reset_game()
                }
                else {
                    this.value = current_mode
                }
            }
        })

        //Listener for processing when the user types in a name
        document.querySelector('input[name=charname]').addEventListener('keyup', function () {
            let matched = false

            //Iterate over all the games
            for (const game of games) {
                //Only proceed if you're checking the current game or if you're checking all games
                if (current_game == game || (current_game == 'all' && list_for_all_games.includes(game))) {
                    name_list = game_map[game][0]
                    //Check if the input is in the current list
                    if (name_list.includes(listName(this.value))) {
                        //Retrieve the index list with the regular position for each of the games
                        //index[0] = row, index[1] = col, index[2] = game
                        indeces = table_index_map[replaceName(this.value)]
                        name = replaceName(listName(this.value).toLowerCase())
                        for (const temp_index of indeces) {
                            index = temp_index
                            //If mode is chaos then overwrite the indeces with the next available square
                            if (current_mode == "chaos") {
                                new_indeces = nextSquareToIndeces(next_square_map[game])
                                index = [new_indeces[0], new_indeces[1], index[2]]
                            }
                            //If mode is inorder then skip the rest of the loop if the index doesn't match the next square
                            else if (current_mode == "inorder") {
                                new_indeces = nextSquareToIndeces(next_square_map[game])
                                if (index[0] != new_indeces[0] || index[1] != new_indeces[1]) {
                                    continue
                                }
                            }
                            //Retrieve the text and image from the square of the appropriate indeces
                            text = document.getElementById(`text_${index[0]}_${index[1]}_${index[2]}`)
                            image = document.getElementById(`img_${index[0]}_${index[1]}_${index[2]}`)
                            //Proceed if the text exists, the name hasn't already been typed, and the game matches the game index
                            if (text != null && text.textContent != listName(name) && game == index[2]) {

                                text.textContent = listName(name)
                                image.querySelector('img').src = `assets/portraits/${index[2]}/${replaceName(name)}.png`
                                image.querySelector('img').style.visibility = 'visible'

                                matched = true
                                next_square_map[game] = next_square_map[game] + 1
                                prevCount = document.getElementById(`count`).textContent
                                document.getElementById(`count`).textContent = Number(prevCount) + 1
                                //Start timer if this is the first name
                                if (prevCount == 0) {
                                    reset()
                                    start()
                                }
                                //Stop timer if this is the last name
                                totalCount = document.getElementById(`totalCount`).textContent
                                if (Number(prevCount) + 1 >= Number(totalCount)) {
                                    stop()
                                }

                            }
                        }
                    }
                }
            }
            //Clears input if a name was successfully matched
            if (matched) {
                typed_names.push(listName(replaceName(listName(this.value).toLowerCase())))
                this.value = ''
            }
        });

        //Listener for Reset button
        document.querySelector('button[name=reset]').addEventListener("click", function () {
            if (!document.getElementById("warnings").checked || confirm("Are you sure you want to reset?")) {
                reset_game()
            }
        });

        //Listener for Give Up button
        document.querySelector('button[name=give_up]').addEventListener("click", function () {
            if (!document.getElementById("warnings").checked || confirm("Are you sure you want to give up?")) {
                giveupColor = "#ff33ff"
                stop()
                if (current_game == "all") {
                    for (const game of list_for_all_games) {
                        name_list = game_map[game][0]
                        for (const name of name_list) {
                            indeces = table_index_map[replaceName(name)]
                            for (const index of indeces) {
                                image = document.getElementById(`img_${index[0]}_${index[1]}_${index[2]}`)
                                text = document.getElementById(`text_${index[0]}_${index[1]}_${index[2]}`)
                                if (!typed_names.includes(listName(name))) {
                                    text.style.color = giveupColor
                                }
                                image.querySelector('img').src = `assets/portraits/${index[2]}/${replaceName(name)}.png`
                                text.textContent = name
                                image.querySelector('img').style.visibility = 'visible'
                            }

                        }
                    }
                }
                else {
                    name_list = game_map[current_game][0]
                    for (const name of name_list) {
                        indeces = table_index_map[replaceName(name)]
                        for (const index of indeces) {
                            image = document.getElementById(`img_${index[0]}_${index[1]}_${index[2]}`)
                            text = document.getElementById(`text_${index[0]}_${index[1]}_${index[2]}`)
                            if (!typed_names.includes(listName(name))) {
                                text.style.color = giveupColor
                            }
                            image.querySelector('img').src = `assets/portraits/${index[2]}/${replaceName(name)}.png`
                            text.textContent = name
                            image.querySelector('img').style.visibility = 'visible'
                        }

                    }
                }
                typed_names = []
            }
        });

        function initialize_game(game) {
            const gameTable = document.getElementById(`${game}Table`)
            gameTable.border = 1

            var nameRow = document.createElement('tr')
            var imgRow = document.createElement('tr')

            gameTable.appendChild(nameRow)
            gameTable.appendChild(imgRow)

            var name_list = game_map[game][0]
            var title = game_map[game][1]

            document.getElementById(`gamename`).textContent = title
            //document.getElementById(`${game}Label`).textContent = title
            document.getElementById(`${game}Logo`).removeAttribute("hidden")

            next_square_map[game] = 0
            //add in an element for each name in fe1_names
            var row = 0
            var col = 0
            var count = 0
            for (const name of name_list) {
                const nameTd = document.createElement('td')
                if (table_index_map[replaceName(name)] != null) {
                    table_index_map[replaceName(name)] = table_index_map[replaceName(name)].concat([[row, col, directory_map[game]]])
                }
                else {
                    table_index_map[replaceName(name)] = [[row, col, directory_map[game]]]
                }
                nameTd.textContent = default_text
                nameTd.id = `text_${row}_${col}_${directory_map[game]}`
                nameTd.style.height = "20px"
                nameTd.style.color = "#ffffff"
                nameRow.appendChild(nameTd)

                const imgTd = document.createElement('td')
                const img = document.createElement('img')
                img.style.visibility = 'hidden'
                img.style.height = "100px"
                img.style.width = "100px"
                imgTd.id = `img_${row}_${col}_${directory_map[game]}`
                imgTd.appendChild(img)
                imgRow.appendChild(imgTd)

                //starting a new row wiith every 10th character
                count = count + 1
                if (count % num_cols == 0) {
                    nameRow = document.createElement('tr')
                    imgRow = document.createElement('tr')

                    gameTable.appendChild(nameRow)
                    gameTable.appendChild(imgRow)

                    row = row + 1
                    col = -1
                }
                col = col + 1
            }
            prevTotal = document.getElementById(`totalCount`).textContent
            document.getElementById(`totalCount`).textContent = Number(prevTotal) + count
        }

        function reset_game() {
            if (current_game == "all") {
                for (const game of list_for_all_games) {
                    name_list = game_map[game][0]
                    next_square_map[game] = 0
                    for (const name of name_list) {
                        indeces = table_index_map[replaceName(name)]
                        for (const index of indeces) {
                            image = document.getElementById(`img_${index[0]}_${index[1]}_${index[2]}`)
                            text = document.getElementById(`text_${index[0]}_${index[1]}_${index[2]}`)
                            text.textContent = default_text
                            text.style.color = "#ffffff"
                            image.querySelector('img').style.visibility = 'hidden'
                        }

                    }
                    document.getElementById(`${game}Logo`).removeAttribute("hidden")
                }
                document.getElementById(`count`).textContent = 0
            }
            else {
                name_list = game_map[current_game][0]
                next_square_map[current_game] = 0
                for (const name of name_list) {
                    indeces = table_index_map[replaceName(name)]
                    for (const index of indeces) {
                        image = document.getElementById(`img_${index[0]}_${index[1]}_${index[2]}`)
                        text = document.getElementById(`text_${index[0]}_${index[1]}_${index[2]}`)
                        text.textContent = default_text
                        text.style.color = "#ffffff"
                        image.querySelector('img').style.visibility = 'hidden'
                    }

                }
                document.getElementById(`${current_game}Logo`).removeAttribute("hidden")
                document.getElementById(`count`).textContent = 0
            }
            typed_names = []
            reset()
        }

        function replaceName(name) {
            return name.toLowerCase().replace(/[^a-zA-Z0-9 ]/g, '')
        }

        function listName(name) {
            if (name.includes(" ")) {
                index = name.indexOf(" ")
                return name.substring(0, 1).toUpperCase() + name.substring(1, index + 1).toLowerCase()
                    + name.substring(index + 1, index + 2).toUpperCase() + name.substring(index + 2).toLowerCase()
            }
            else if (name.includes("'")) {
                if (name == "say'ri") {
                    return "Say'ri"
                }
                else if (name == "l'arachel") {
                    return "L'Arachel"
                }
            }
            return name.substring(0, 1).toUpperCase() + name.substring(1).toLowerCase()
        }

        var timeElapsed = 0;
        var myTimer;

        function nextSquareToIndeces(nextSquare) {
            row = Math.floor(nextSquare / num_cols)
            col = nextSquare % num_cols
            return [row, col]
        }

        function tick() {
            timeElapsed++;
            document.getElementById("hours").textContent = Math.floor((timeElapsed / 3600))
            document.getElementById("minutes").textContent = zeroPad(Math.floor((timeElapsed % 3600) / 60))
            document.getElementById("seconds").textContent = zeroPad(timeElapsed % 60);
        }
        function start() {
            myTimer = setInterval(tick, 1000);
        }
        function stop() {
            clearInterval(myTimer);
        }
        function reset() {
            stop();
            timeElapsed = -1;
            tick()
        }
        function zeroPad(num) {
            if (num >= 0 && num <= 9) {
                return "0" + num
            }
            return "" + num
        }

    </script>
